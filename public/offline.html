<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Rubiks Academy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card { text-align: center; max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #FFCC00; margin-bottom: 8px; }
    p { font-size: 15px; color: #a0a0b8; line-height: 1.6; margin-bottom: 24px; }
    .status { font-size: 13px; color: #a0a0b8; }
    .status.checking { color: #FFCC00; }
    .status.online { color: #4ade80; }
    button {
      background: #FFCC00;
      color: #1a1a2e;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — your progress is saved. We'll take you back automatically when you reconnect.</p>
    <button id="retry" onclick="checkAndReload()">Try Again</button>
    <div id="status" class="status">Waiting for connection…</div>
  </div>

  <script>
    var statusEl = document.getElementById('status');
    var retryBtn = document.getElementById('retry');
    var checkTimer = null;

    function checkAndReload() {
      retryBtn.disabled = true;
      statusEl.textContent = 'Checking connection…';
      statusEl.className = 'status checking';

      fetch('/favicon.ico?_=' + Date.now(), { method: 'HEAD', cache: 'no-store' })
        .then(function(res) {
          if (res.ok) {
            statusEl.textContent = 'Connected! Redirecting…';
            statusEl.className = 'status online';
            // Go back to where user was, or dashboard
            var dest = sessionStorage.getItem('offline-return-url') || '/dashboard';
            window.location.replace(dest);
          } else {
            throw new Error('not ok');
          }
        })
        .catch(function() {
          statusEl.textContent = 'Still offline. Will retry automatically…';
          statusEl.className = 'status';
          retryBtn.disabled = false;
        });
    }

    // Save the referrer so we can return the user
    if (document.referrer && document.referrer.indexOf(location.origin) === 0) {
      sessionStorage.setItem('offline-return-url', document.referrer);
    }

    // Auto-check every 3 seconds
    checkTimer = setInterval(checkAndReload, 3000);

    // Also listen to the online event for instant detection
    window.addEventListener('online', function() {
      clearInterval(checkTimer);
      checkAndReload();
    });
  </script>
</body>
</html>
